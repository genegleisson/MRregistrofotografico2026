<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galeria 2026 · EMEF Maria Regiana</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2d7a4a;
      --primary-dark: #1a4d2e;
      --accent: #f59e0b;
      --bg: #f3f4f6;
      --white: #ffffff;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Sora', sans-serif; background: var(--bg); color: #1f2937; }

    /* Login */
    #login-screen {
      position: fixed; inset: 0; background: var(--primary); 
      display: flex; align-items: center; justify-content: center; z-index: 1000;
    }
    .login-box {
      background: var(--white); padding: 2rem; border-radius: 1rem; 
      text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 90%; max-width: 400px;
    }
    .btn {
      display: block; width: 100%; padding: 0.8rem; margin-top: 1rem;
      border: none; border-radius: 0.5rem; cursor: pointer; font-weight: 600; transition: 0.3s;
    }
    .btn-admin { background: var(--primary); color: white; }
    .btn-visitor { background: #e5e7eb; color: #374151; }

    /* Layout */
    header { background: var(--white); padding: 1.5rem; text-align: center; border-bottom: 2px solid #e5e7eb; }
    .container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
    
    .grid-turmas {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1.5rem;
    }
    .card-turma {
      background: var(--white); padding: 1.5rem; border-radius: 0.8rem;
      cursor: pointer; border: 1px solid #e5e7eb; transition: 0.3s;
    }
    .card-turma:hover { transform: translateY(-5px); border-color: var(--primary); }

    /* Modal Alunos */
    .modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7); 
      display: none; align-items: center; justify-content: center; padding: 1rem; z-index: 900;
    }
    .modal-content {
      background: var(--white); width: 100%; max-width: 800px; max-height: 90vh;
      border-radius: 1rem; overflow-y: auto; padding: 2rem; position: relative;
    }
    .close-modal { position: absolute; top: 1rem; right: 1rem; font-size: 1.5rem; cursor: pointer; }

    .aluno-item {
      display: flex; align-items: center; gap: 1rem; padding: 1rem;
      border-bottom: 1px solid #f3f4f6;
    }
    .aluno-foto {
      width: 60px; height: 60px; border-radius: 50%; object-fit: cover;
      background: #e5e7eb; border: 2px solid var(--primary);
    }
    .admin-controls {
      margin-top: 1rem; padding: 1rem; background: #f9fafb; border-radius: 0.5rem;
    }
    input[type="text"] {
      width: 100%; padding: 0.5rem; margin: 0.5rem 0; border: 1px solid #ccc; border-radius: 0.4rem;
    }
    .btn-del { color: var(--danger); background: none; border: none; cursor: pointer; font-size: 0.8rem; }
  </style>
</head>
<body>

  <div id="login-screen">
    <div class="login-box">
      <h2>Escola Maria Regiana</h2>
      <p>Registro Fotográfico 2026</p>
      <button class="btn btn-admin" onclick="login('admin')">Acesso Coordenador (Admin)</button>
      <button class="btn btn-visitor" onclick="login('visitor')">Acesso Visitante</button>
    </div>
  </div>

  <header>
    <h1>Galeria Escolar 2026</h1>
    <p id="user-status"></p>
  </header>

  <div class="container">
    <div id="lista-turmas" class="grid-turmas"></div>
  </div>

  <div id="modal-turma" class="modal">
    <div class="modal-content">
      <span class="close-modal" onclick="fecharModal()">&times;</span>
      <h2 id="modal-titulo"></h2>
      <div id="admin-add-area"></div> <div id="lista-alunos"></div>
    </div>
  </div>

  <script>
    let dados = { turmas: [], alunos: [] };
    let userRole = 'visitor';

    // 1. LOGIN
    function login(role) {
      userRole = role;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('user-status').innerText = role === 'admin' ? "Modo: Administrador" : "Modo: Visitante";
      carregarDados();
    }

    // 2. CARREGAR DADOS
    async function carregarDados() {
      const salvos = localStorage.getItem('maria_regiana_2026');
      if (salvos) {
        dados = JSON.parse(salvos);
      } else {
        try {
          const resp = await fetch('dados_alunos.json');
          dados = await resp.json();
          salvar();
        } catch (e) { console.error("Arquivo JSON não encontrado, iniciando vazio."); }
      }
      renderizarTurmas();
    }

    function salvar() {
      localStorage.setItem('maria_regiana_2026', JSON.stringify(dados));
    }

    // 3. RENDERIZAR TURMAS
    function renderizarTurmas() {
      const container = document.getElementById('lista-turmas');
      container.innerHTML = dados.turmas.map(t => `
        <div class="card-turma" onclick="abrirTurma('${t.id}')">
          <h3>${t.nome}</h3>
          <p>Prof: ${t.professor || 'Não definido'}</p>
        </div>
      `).join('');
    }

    // 4. ABRIR TURMA E LISTAR ALUNOS
    function abrirTurma(turmaId) {
      const turma = dados.turmas.find(t => t.id === turmaId);
      document.getElementById('modal-titulo').innerText = turma.nome;
      document.getElementById('modal-turma').style.display = 'flex';
      
      const addArea = document.getElementById('admin-add-area');
      if (userRole === 'admin') {
        addArea.innerHTML = `
          <div class="admin-controls">
            <h4>Adicionar Novo Aluno</h4>
            <input type="text" id="novo-nome" placeholder="Nome completo">
            <button class="btn btn-admin" onclick="addAluno('${turmaId}')">Cadastrar Aluno</button>
          </div>
        `;
      } else {
        addArea.innerHTML = "";
      }

      renderizarAlunos(turmaId);
    }

    function renderizarAlunos(turmaId) {
      const lista = document.getElementById('lista-alunos');
      const alunosDaTurma = dados.alunos.filter(a => a.turmaId === turmaId);

      lista.innerHTML = alunosDaTurma.map(a => `
        <div class="aluno-item">
          <img src="${a.foto || 'https://via.placeholder.com/60'}" class="aluno-foto">
          <div style="flex:1">
            <strong>${a.nome}</strong>
            ${userRole === 'admin' ? `
              <input type="text" placeholder="Link da foto (Google Fotos)" 
                onchange="atualizarFoto('${a.id}', this.value)" value="${a.foto || ''}">
              <button class="btn-del" onclick="removerAluno('${a.id}', '${turmaId}')">Excluir Aluno</button>
            ` : ''}
          </div>
        </div>
      `).join('');
    }

    // 5. FUNÇÕES ADMIN
    function addAluno(turmaId) {
      const nome = document.getElementById('novo-nome').value;
      if (!nome) return;
      const novo = { id: "aluno_" + Date.now(), turmaId: turmaId, nome: nome, foto: null };
      dados.alunos.push(novo);
      salvar();
      renderizarAlunos(turmaId);
      document.getElementById('novo-nome').value = "";
    }

    function atualizarFoto(alunoId, link) {
      const aluno = dados.alunos.find(a => a.id === alunoId);
      if (aluno) {
        aluno.foto = link;
        salvar();
      }
    }

    function removerAluno(alunoId, turmaId) {
      if (confirm("Deseja remover este aluno?")) {
        dados.alunos = dados.alunos.filter(a => a.id !== alunoId);
        salvar();
        renderizarAlunos(turmaId);
      }
    }

    function fecharModal() {
      document.getElementById('modal-turma').style.display = 'none';
    }
  </script>
</body>
</html>
