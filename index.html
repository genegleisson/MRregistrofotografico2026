<script>
const API_URL = "https://script.google.com/macros/s/AKfycby8XRNnZr_RUDd7jZAl2eECCBFgGtkUm4ye7oo1W7gyawdV_tH798JAgx2J_I6AxBA/exec";

let dados = { turmas: [], alunos: [] };
let isAdmin = false;
let turmaAtiva = null;

async function carregarDados() {
  const response = await fetch('dados_alunos.json');
  const data = await response.json();
  dados = data;
  renderizar();
}

function renderizar() {
  const container = document.getElementById('turmas-container');
  container.innerHTML = '';

  dados.turmas.forEach(turma => {
    const alunos = dados.alunos.filter(a => a.turmaId === turma.id);

    const card = document.createElement('div');
    card.className = 'turma-card';

    card.innerHTML = `
      <div class="turma-header">
        <div class="turma-name">${turma.nome}</div>
        <div class="turma-stats">${alunos.length} alunos</div>
      </div>
      <div class="turma-body">
        <button class="turma-btn" onclick="abrirTurma('${turma.id}')">
          Abrir Álbum
        </button>
      </div>
    `;

    container.appendChild(card);
  });
}

function abrirTurma(turmaId) {
  turmaAtiva = turmaId;
  const turma = dados.turmas.find(t => t.id === turmaId);
  const alunos = dados.alunos.filter(a => a.turmaId === turmaId);

  document.getElementById('modal-title').textContent = turma.nome;

  const lista = document.getElementById('alunos-list');
  lista.innerHTML = '';

  alunos.forEach(aluno => {
    const div = document.createElement('div');
    div.className = 'aluno-card';

    div.innerHTML = `
      <div class="foto-box" onclick="clicarFoto('${aluno.id}')">
        ${aluno.foto 
          ? `<img src="${aluno.foto}">` 
          : `<div class="foto-placeholder">+</div>`}
      </div>

      <input type="file" accept="image/*" id="file-${aluno.id}" style="display:none"
        onchange="uploadFoto(event, '${aluno.id}')">

      <div class="aluno-info">
        <div class="aluno-info-name">${aluno.nome}</div>
      </div>
    `;

    lista.appendChild(div);
  });

  document.getElementById('modal-turma').classList.add('active');
}

function clicarFoto(id) {
  if (!isAdmin) return alert("Somente administrador pode enviar fotos");
  document.getElementById(`file-${id}`).click();
}

async function uploadFoto(event, alunoId) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = async function(e) {
    const base64 = e.target.result.split(',')[1];

    const response = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({
        nome: file.name,
        tipo: file.type,
        base64: base64
      })
    });

    const result = await response.json();

    if (result.status === "sucesso") {
      const aluno = dados.alunos.find(a => a.id === alunoId);
      aluno.foto = result.url;

      salvarLocal();
      abrirTurma(turmaAtiva);
    } else {
      alert("Erro ao enviar foto");
    }
  };

  reader.readAsDataURL(file);
}

function salvarLocal() {
  localStorage.setItem("album2026", JSON.stringify(dados));
}

function carregarLocal() {
  const salvo = localStorage.getItem("album2026");
  if (salvo) dados = JSON.parse(salvo);
}

function fecharModal() {
  document.getElementById('modal-turma').classList.remove('active');
}

function loginAdmin() {
  if (document.getElementById('password-input').value === "2026") {
    isAdmin = true;
    entrar();
  } else {
    alert("Senha incorreta");
  }
}

function loginVisitor() {
  isAdmin = false;
  entrar();
}

function entrar() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  carregarLocal();
  renderizar();
}

carregarDados();
</script>
